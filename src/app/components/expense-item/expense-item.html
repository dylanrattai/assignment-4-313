<div
  class="card border-0 shadow-sm expense-card"
  [class.high-expense]="amountLevel === 'high'"
  [class.medium-expense]="amountLevel === 'medium'"
  [style.border-left]="'4px solid ' + categoryColor"
>
  <div class="card-body py-3 px-4">
    <div class="d-flex align-items-center justify-content-between gap-3">

      <!-- Category Icon + Info -->
      <div class="d-flex align-items-center gap-3 flex-grow-1 min-w-0">
        <div
          class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
          [style.background-color]="categoryColor + '22'"
          style="width: 44px; height: 44px;"
        >
          <i class="bi fs-5"
             [class]="categoryIcon"
             [style.color]="categoryColor">
          </i>
        </div>
        <div class="min-w-0">
          <div class="fw-semibold text-truncate">{{ expense.title }}</div>
          <span class="badge rounded-pill small"
                [style.background-color]="categoryColor">
            {{ expense.category }}
          </span>
        </div>
      </div>

      <!-- Amount + Level Badge -->
      <div class="text-end flex-shrink-0">
        <div
          class="fw-bold fs-5"
          [class.text-danger]="amountLevel === 'high'"
          [class.text-warning]="amountLevel === 'medium'"
          [class.text-success]="amountLevel === 'low'"
        >
          {{ expense.amount | currency }}
        </div>
        @if (amountLevel === 'high') {
          <span class="badge bg-danger-subtle text-danger small">High</span>
        } @else if (amountLevel === 'medium') {
          <span class="badge bg-warning-subtle text-warning small">Medium</span>
        } @else {
          <span class="badge bg-success-subtle text-success small">Low</span>
        }
      </div>

      <!-- Action Buttons -->
      <div class="d-flex gap-1 flex-shrink-0">
        <button
          class="btn btn-sm btn-outline-primary"
          title="Edit"
          (click)="editExpense.emit(expense)"
        >
          <i class="bi bi-pencil"></i>
        </button>
        <button
          class="btn btn-sm btn-outline-danger"
          title="Delete"
          (click)="deleteExpense.emit(expense.id)"
        >
          <i class="bi bi-trash"></i>
        </button>
      </div>

    </div>
  </div>
</div>
